<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recovery Disk | Unified Portal</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-storage-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;800&display=swap" rel="stylesheet">

    <style>
        :root { 
            --gold: #d4af37; 
            --primary: #00f2fe; 
            --dark: #050505; 
            --error: #ff4b2b;
            --success: #2ecc71;
            --font-main: 18px; 
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        
        body { 
            background: var(--dark); 
            color: #fff; 
            overflow-x: hidden; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            padding: 40px 20px; 
            font-size: var(--font-main);
        }

        #bg-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }

        .main-wrapper { 
            width: 100%; 
            max-width: 650px; 
            background: rgba(10, 10, 10, 0.9); 
            backdrop-filter: blur(30px); 
            padding: 60px 50px; 
            border-radius: 40px; 
            border: 2px solid rgba(212, 175, 55, 0.4);
            box-shadow: 0 30px 80px rgba(0,0,0,0.9);
            overflow-y: auto; 
            max-height: 90vh;
            animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }

        .portal-logo { width: 160px; display: block; margin: 0 auto 25px; filter: drop-shadow(0 0 15px var(--primary)); }
        
        h1 { 
            color: var(--gold); 
            text-align: center; 
            font-weight: 800; 
            letter-spacing: 4px; 
            text-transform: uppercase; 
            font-size: 2.5rem; 
            margin-bottom: 15px;
        }
        
        h2 { 
            color: #bbb; 
            text-align: center; 
            font-size: 1.25rem; 
            margin-bottom: 50px; 
            letter-spacing: 1px; 
        }

        .selection-box button { 
            width: 100%; 
            margin: 20px 0; 
            padding: 24px; 
            font-weight: 800; 
            font-size: 1.3rem; 
            border-radius: 20px; 
            border: 2px solid rgba(255,255,255,0.1); 
            cursor: pointer; 
            background: rgba(255,255,255,0.05); 
            color: var(--primary); 
            transition: 0.4s; 
            text-transform: uppercase;
        }

        input, select, textarea { 
            width: 100%; 
            padding: 20px; 
            margin-bottom: 25px; 
            border-radius: 18px; 
            border: 1px solid rgba(255,255,255,0.2); 
            background: rgba(0,0,0,0.6); 
            color: #fff; 
            font-size: 1.1rem; 
            outline: none; 
            transition: 0.3s;
        }

        .toggle-group { display: flex; gap: 20px; margin-bottom: 30px; }
        .toggle-group button { 
            flex: 1; 
            padding: 22px; 
            border-radius: 18px; 
            border: none; 
            font-weight: 800; 
            font-size: 1.2rem;
            color: white; 
            cursor: pointer; 
            opacity: 0.3; 
            transition: 0.4s; 
        }
        .active-btn { opacity: 1 !important; transform: scale(1.05); }

        .btn-submit { 
            width: 100%; 
            padding: 24px; 
            border-radius: 18px; 
            border: none; 
            background: linear-gradient(45deg, var(--primary), var(--gold)); 
            color: #000; 
            font-weight: 900; 
            font-size: 1.4rem; 
            cursor: pointer; 
            margin-top: 20px;
            text-transform: uppercase; 
            letter-spacing: 3px; 
            transition: 0.5s;
        }

        label { 
            display: block;
            margin-bottom: 12px;
            margin-left: 8px;
            color: var(--gold);
            font-weight: 600;
            font-size: 1rem;
            text-transform: uppercase;
        }
        
        /* IMAGE UPLOAD STYLE */
        .file-input-wrapper {
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 18px;
            border: 1px dashed var(--primary);
            margin-bottom: 25px;
            transition: 0.3s;
        }
        .file-input-wrapper:hover { background: rgba(0, 242, 254, 0.05); }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>

    <div class="main-wrapper">
        
        <div id="selectorSection" class="selection-box">
            <h1>Recovery Disk</h1>
            <h2>Institutional Access Portal</h2>
            <button onclick="showSection('studentForm')">Student Access</button>
            <button onclick="showSection('teacherForm')">Faculty Access</button>
        </div>

        <div id="studentForm" style="display:none;">
            <h1>Student Registry</h1>
            <label>Legal Identification</label>
            <input type="text" id="s_name" placeholder="Full Name">
            <input type="text" id="s_roll" placeholder="Roll Number (e.g. 24SS1A6244)">
            <label>Contact Info</label>
            <input type="tel" id="s_phone" placeholder="Contact Number">
            <input type="email" id="s_email" placeholder="Institutional Email">
            <select id="s_dept">
                <option value="CSE">CSE (Cyber Security)</option>
                <option value="EEE">EEE</option>
                <option value="IT">IT</option>
            </select>
            <button class="btn-submit" onclick="handleAuth('Student')">Authorize Access</button>
        </div>

        <div id="teacherForm" style="display:none;">
            <h1>Faculty Registry</h1>
            <label>Staff Identification</label>
            <input type="text" id="t_name" placeholder="Full Name">
            <select id="t_designation">
                <option value="Assistant Professor">Assistant Professor</option>
                <option value="HOD">HOD</option>
            </select>
            <label>Official Contact</label>
            <input type="email" id="t_email" placeholder="Official Email">
            <input type="tel" id="t_phone" placeholder="Phone Number">
            <button class="btn-submit" onclick="handleAuth('Teacher')">Authorize Access</button>
        </div>

        <div id="reportSection" style="display:none;">
            <h1>New Report</h1>
            <div class="toggle-group">
                <button type="button" class="active-btn" id="lostBtn" style="background:var(--error);" onclick="setType('Lost')">LOST</button>
                <button type="button" id="foundBtn" style="background:var(--success);" onclick="setType('Found')">FOUND</button>
            </div>

           <form id="unifiedReportForm">
            <label>Asset Classification</label>
            <select id="itemName" required>
                <option value="">-- Choose Category --</option>
                <option>Laptop / MacBook</option>
                <option>Tablet / iPad</option>
                <option>Mobile Phone / Smartphone</option>
                <option>Institutional ID Card</option>
                <option>Scientific Calculator</option>
                <option>Wireless Earbuds / Headphones</option>
                <option>Wallet / Purse</option>
                <option>Keys (Vehicle/Room)</option>
                <option>Books / Study Material</option>
                <option>Watch / Smartwatch</option>
                <option>Other Electronics</option>
                <option>Personal Belongings</option>
            </select>

            <div class="form-row">
                <div>
                    <label>Color Appearance</label>
                    <select id="color" required>
                        <option value="">-- Primary Color --</option>
                        <option>Black / Jet Black</option>
                        <option>Space Grey / Graphite</option>
                        <option>Silver / White</option>
                        <option>Gold / Rose Gold</option>
                        <option>Blue / Navy</option>
                        <option>Red / Burgundy</option>
                        <option>Green / Olive</option>
                        <option>Other / Multi-color</option>
                    </select>
                </div>
                <div>
                    <label>Brand / Make</label>
                    <input type="text" id="brand" placeholder="e.g. Apple, Dell, HP">
                </div>
            </div>

            <label>Incident Location</label>
            <select id="location" required>
                <option value="">-- Precise Location --</option>
                <option>CSE Block - Ground Floor (Lobby)</option>
                <option>CSE Block - 1st Floor (Labs)</option>
                <option>CSE Block - 2nd Floor (Seminar Hall)</option>
                <option>EEE Block - 1st Floor</option>
                <option>EEE Block - 2nd Floor</option>
                <option>Central Library (Reading Room)</option>
                <option>Central Library (Digital Zone)</option>
                <option>Main Canteen / Food Court</option>
                <option>Auditorium / Open Air Theater</option>
                <option>Sports Complex / Gymnasium</option>
                <option>Examination Branch</option>
                <option>Campus Main Gate</option>
                <option>College Bus Parking Area</option>
            </select>

            <label>Detailed Description</label>
            <textarea id="description" rows="4" placeholder="Mention unique marks, stickers, case type, or screen status..."></textarea>

            <label>Visual Verification (Photo)</label>
            <div class="file-input-wrapper">
                <input type="file" id="itemImage" accept="image/*" style="background:none; border:none; padding:0; font-size: 1rem;">
            </div>
            
            <label>Verified Submitter ID</label>
            <input type="text" id="verified_id" readonly style="background:rgba(0,242,254,0.08); color:var(--primary); border: 2px dashed var(--primary); text-align:center; font-weight: 800; cursor: default;">
            
            <button type="submit" class="btn-submit" id="submitBtn">Sync with Control Center</button>
        </form>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('bg-canvas');
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);

        const geometry = new THREE.BufferGeometry();
        const vertices = [];
        for (let i = 0; i < 5000; i++) {
            vertices.push(THREE.MathUtils.randFloatSpread(2000), THREE.MathUtils.randFloatSpread(2000), THREE.MathUtils.randFloatSpread(2000));
        }
        geometry.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
        const material = new THREE.PointsMaterial({ color: 0x00f2fe, size: 2, transparent: true, opacity: 0.7 });
        const points = new THREE.Points(geometry, material);
        scene.add(points);
        camera.position.z = 500;

        function animate() {
            requestAnimationFrame(animate);
            points.rotation.y += 0.001;
            renderer.render(scene, camera);
        }
        animate();

        const firebaseConfig = {
            apiKey: "AiZaSyDg1bSCdLj2Em-1WhLInzHevEGT4apSM7U",
            authDomain: "first-rtrp.firebaseapp.com",
            projectId: "first-rtrp",
            storageBucket: "first-rtrp.firebasestorage.app",
            messagingSenderId: "708933730040",
            appId: "1:708933730040:web:f2ed464143a28f8967c50d"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const storage = firebase.storage();

        let reportType = "Lost";
        let userContact = "";
        let userEmail = "";

        function showSection(id) {
            document.getElementById('selectorSection').style.display = 'none';
            document.getElementById(id).style.display = 'block';
        }

        async function handleAuth(role) {
            const id = (role === 'Student') ? document.getElementById('s_roll').value : document.getElementById('t_email').value;
            userEmail = (role === 'Student') ? document.getElementById('s_email').value : document.getElementById('t_email').value;
            userContact = (role === 'Student') ? document.getElementById('s_phone').value : document.getElementById('t_phone').value;
            
            if(!id || !userEmail) { alert("Institutional ID required."); return; }

            const registrationData = {
                name: (role === 'Student') ? document.getElementById('s_name').value : document.getElementById('t_name').value,
                id: id,
                email: userEmail,
                phone: userContact,
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            };

            const col = role === 'Student' ? "student_registrations" : "teacher_registrations";
            await Promise.all([
                db.collection("users").doc(id).set(registrationData),
                db.collection(col).doc(id).set(registrationData)
            ]);
            
            document.getElementById('verified_id').value = "VERIFIED ID: " + id;
            document.getElementById('studentForm').style.display = 'none';
            document.getElementById('teacherForm').style.display = 'none';
            document.getElementById('reportSection').style.display = 'block';
        }

        function setType(type) {
            reportType = type;
            document.getElementById('lostBtn').classList.toggle('active-btn', type === 'Lost');
            document.getElementById('foundBtn').classList.toggle('active-btn', type === 'Found');
        }

        document.getElementById('unifiedReportForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const file = document.getElementById('itemImage').files[0];
            
            btn.disabled = true;
            btn.innerText = "UPLINKING TO CLOUD...";

            const reportData = {
                itemName: document.getElementById('itemName').value,
                brand: document.getElementById('brand').value,
                location: document.getElementById('location').value,
                description: document.getElementById('description').value || "None",
                user_id: document.getElementById('verified_id').value.replace("VERIFIED ID: ", ""),
                phone: userContact,
                email: userEmail,
                type: reportType,
                timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                itemPhoto: "Processing..."
            };

            const collection = reportType === "Lost" ? "lost_reports" : "found_reports";
            const docRef = await db.collection(collection).add(reportData);

            if(file) {
                storage.ref(`evidence/${docRef.id}`).put(file).then(async (snap) => {
                    const url = await snap.ref.getDownloadURL();
                    await docRef.update({ itemPhoto: url });
                });
            }
            
            alert("Institutional Alert Deployed Successfully!");
            location.reload();
        };
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RECOVERY DISK | Cross-Notification</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <style>
        :root { 
            --gold: #d4af37; 
            --primary: #00f2fe;
            --silver: #e0e0e0; 
            --bg: #050505; 
            --card-glass: rgba(255, 255, 255, 0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        
        body { 
            background: var(--bg); 
            color: #fff; 
            overflow-x: hidden; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            padding: 20px;
            font-size: 16px; /* Increased base size */
        }

        /* 3D BACKGROUND */
        #bg-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }

        /* GLASS CONTAINER */
        .container { 
            background: rgba(10, 10, 10, 0.9); 
            backdrop-filter: blur(30px); 
            border: 2px solid rgba(212, 175, 55, 0.4); 
            padding: 50px; 
            border-radius: 30px; 
            width: 100%; 
            max-width: 600px; 
            text-align: center; 
            box-shadow: 0 40px 100px rgba(0,0,0,0.9);
            animation: slideUp 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }

        h1 { 
            color: var(--gold); 
            font-size: 28px; 
            margin-bottom: 35px; 
            text-transform: uppercase; 
            letter-spacing: 5px; 
            font-weight: 900; 
            text-shadow: 0 0 15px rgba(212, 175, 55, 0.3);
        }
        
        #loading { font-size: 14px; letter-spacing: 3px; color: var(--primary); font-weight: 800; animation: pulse 1.5s infinite; }
        @keyframes pulse { 50% { opacity: 0.4; } }

        /* DATA CARDS */
        .data-card { 
            background: var(--card-glass); 
            padding: 25px; 
            border-radius: 20px; 
            margin-bottom: 20px; 
            text-align: left; 
            border: 1px solid rgba(255,255,255,0.1); 
            transition: 0.4s ease;
        }
        .data-card:hover { background: rgba(255,255,255,0.08); transform: scale(1.02) translateY(-5px); border-color: var(--primary); }

        .label { 
            color: var(--gold); 
            font-size: 12px; 
            font-weight: 900; 
            display: block; 
            margin-bottom: 8px; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
        }
        
        .val-text { font-size: 18px; color: #fff; line-height: 1.6; }
        .val-text b { color: var(--primary); font-weight: 800; }

        /* EXECUTE BUTTON */
        .btn-sync { 
            width: 100%; 
            padding: 22px; 
            background: linear-gradient(45deg, var(--gold), #f39c12); 
            color: #000; 
            border: none; 
            border-radius: 15px; 
            font-weight: 900; 
            font-size: 18px; 
            cursor: pointer; 
            margin-top: 25px; 
            transition: 0.4s; 
            text-transform: uppercase; 
            letter-spacing: 2px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }
        .btn-sync:hover { 
            filter: brightness(1.2); 
            box-shadow: 0 0 40px rgba(212, 175, 55, 0.5); 
            transform: translateY(-5px); 
        }

        .return-link { 
            margin-top: 30px; 
            font-size: 13px; 
            color: #888; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            cursor: pointer; 
            transition: 0.3s; 
            display: inline-block;
            font-weight: 600;
        }
        .return-link:hover { color: var(--primary); transform: translateX(-5px); }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>

    <div class="container">
        <h1>Protocol Gateway</h1>
        
        <div id="loading">ENCRYPTED METADATA RETRIEVAL IN PROGRESS...</div>

        <div id="portalContent" style="display:none;">
            <div class="data-card" style="border-top: 3px solid var(--primary); background: rgba(0, 242, 254, 0.03);">
                <span class="label">Matched Institutional Asset</span>
                <p id="itemName" style="font-size: 26px; color: var(--gold); font-weight: 900; letter-spacing: -1px;"></p>
            </div>

            <div class="data-card" style="border-left: 6px solid #ef4444;">
                <span class="label">Confirmed Target (Owner)</span>
                <p class="val-text">Institutional ID: <b id="ownerID"></b></p>
                <p class="val-text" style="font-size: 15px; margin-top: 5px;">Primary Email: <span id="ownerEmail" style="color:var(--silver)"></span></p>
            </div>

            <div class="data-card" style="border-left: 6px solid #22c55e;">
                <span class="label">Recovery Source (Finder)</span>
                <p class="val-text">Institutional ID: <b id="finderID"></b></p>
                <p class="val-text" style="font-size: 15px; margin-top: 5px;">Primary Email: <span id="finderEmail" style="color:var(--silver)"></span></p>
            </div>

            <button class="btn-sync" onclick="triggerCrossEmails()">Execute Alert Broadcast</button>
            <br>
            <p class="return-link" onclick="window.location.href='admin.html'">
                ← Terminate & Return to Command
            </p>
        </div>
    </div>

    <script>
        /* 1. 3D BACKGROUND ENGINE */
        const canvas = document.getElementById('bg-canvas');
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);

        const geometry = new THREE.BufferGeometry();
        const vertices = [];
        for (let i = 0; i < 6000; i++) {
            vertices.push(THREE.MathUtils.randFloatSpread(2000), THREE.MathUtils.randFloatSpread(2000), THREE.MathUtils.randFloatSpread(2000));
        }
        geometry.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
        const material = new THREE.PointsMaterial({ color: 0x00f2fe, size: 1.5, transparent: true, opacity: 0.6 });
        const points = new THREE.Points(geometry, material);
        scene.add(points);
        camera.position.z = 500;

        function animate() {
            requestAnimationFrame(animate);
            points.rotation.y += 0.0006;
            points.rotation.x += 0.0002;
            renderer.render(scene, camera);
        }
        animate();

        /* 2. FIREBASE & CROSS-NOTIFICATION LOGIC */
        const firebaseConfig = { apiKey: "AiZaSyDg1bSCdLj2Em-1WhLInzHevEGT4apSM7U", projectId: "first-rtrp" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const params = new URLSearchParams(window.location.search);
        const oId = params.get('ownerId');
        const fId = params.get('finderId');
        const item = params.get('item');

        let ownerData, finderData;

        async function fetchUniqueDetails() {
            try {
                // Parallel fetching for performance
                const [oRef, fRef] = await Promise.all([
                    db.collection("users").doc(oId).get(),
                    db.collection("users").doc(fId).get()
                ]);

                ownerData = oRef.data();
                finderData = fRef.data();

                if (!ownerData || !finderData) {
                    throw new Error("One or more user profiles not found in institutional database.");
                }

                document.getElementById('itemName').innerText = item;
                document.getElementById('ownerID').innerText = oId;
                document.getElementById('finderID').innerText = fId;

                document.getElementById('ownerEmail').innerText = ownerData.email;
                document.getElementById('finderEmail').innerText = finderData.email;

                document.getElementById('loading').style.display = 'none';
                document.getElementById('portalContent').style.display = 'block';
            } catch (e) {
                alert("CRITICAL ERROR: " + e.message);
                window.location.href = 'admin.html';
            }
        }

        function triggerCrossEmails() {
            const crossBody = `--- RECOVERY DISK: AUTOMATED MATCH ALERT ---\n\nValidation protocol has confirmed a match for your reported asset: ${item}\n\n[OWNER DATA]\nRoll No: ${oId}\nName: ${ownerData.name}\n\n[FINDER DATA]\nRoll No: ${fId}\nName: ${finderData.name}\n\nACTION REQUIRED:\nPlease coordinate with the Admin Panel or meet at the designated Institutional Security point for asset handover.\n\nTIMESTAMP: ${new Date().toLocaleString()}`;

            const mailLink = `mailto:${ownerData.email}?cc=${finderData.email}&subject=${encodeURIComponent("RECOVERY DISK | High-Confidence Match: " + item)}&body=${encodeURIComponent(crossBody)}`;
            
            window.location.href = mailLink;
            alert(`Broadcasting Institutional Alerts for IDs: ${oId} and ${fId}`);
        }

        if(oId && fId) {
            fetchUniqueDetails();
        } else {
            alert("Malformed Protocol Request.");
            window.location.href = 'admin.html';
        }
    </script>
</body>
</html>

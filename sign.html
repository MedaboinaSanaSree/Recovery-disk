<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RECOVERY DISK | Admin Sign-In</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <style>
        :root {
            --primary: #00f2fe;
            --gold: #d4af37;
            --dark-bg: #050505;
            --glass: rgba(255, 255, 255, 0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: var(--dark-bg); color: #fff; overflow: hidden; display: flex; justify-content: center; align-items: center; min-height: 100vh; }

        /* 3D STARFIELD BACKGROUND */
        #bg-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }

        /* SINGLE FOCUSED CARD */
        .card { 
            background: rgba(10, 10, 10, 0.85); 
            width: 100%;
            max-width: 600px; /* Focused width for the form only */
            padding: 60px;
            border-radius: 30px; 
            border: 2px solid rgba(212, 175, 55, 0.4);
            backdrop-filter: blur(30px);
            box-shadow: 0 0 80px rgba(0, 0, 0, 0.9);
            animation: fadeIn 0.8s ease-out;
            text-align: center;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .brand-tag { 
            color: var(--primary); 
            font-weight: 800; 
            font-size: 14px; 
            letter-spacing: 5px; 
            margin-bottom: 15px; 
            text-transform: uppercase; 
        }

        h1 { 
            color: var(--gold); 
            font-size: 42px; 
            margin-bottom: 10px; 
            font-weight: 900; 
            letter-spacing: -1px; 
        }

        .sub-text { 
            color: #aaa; 
            font-size: 16px; 
            margin-bottom: 40px; 
        }

        /* NEON INPUTS */
        .input-group { margin-bottom: 20px; text-align: left; }
        
        label {
            display: block;
            margin-bottom: 8px;
            margin-left: 10px;
            color: var(--gold);
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .input-box { 
            width: 100%; 
            padding: 20px; 
            background: rgba(255, 255, 255, 0.05); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 16px; 
            outline: none; 
            color: #fff;
            transition: 0.4s; 
            font-size: 18px; /* Increased font size */
        }

        .input-box:focus { 
            border-color: var(--primary); 
            background: rgba(0, 242, 254, 0.08); 
            box-shadow: 0 0 25px rgba(0, 242, 254, 0.25); 
        }
        
        .readonly { 
            border: 1px dashed var(--gold); 
            background: rgba(212, 175, 55, 0.05); 
            color: var(--gold); 
            cursor: not-allowed; 
            font-weight: 600;
        }

        .btn-deploy { 
            width: 100%; 
            padding: 22px; 
            background: linear-gradient(45deg, var(--primary), var(--gold)); 
            color: #000; 
            border: none; 
            border-radius: 16px; 
            font-weight: 900; 
            font-size: 20px; /* Large action button */
            cursor: pointer; 
            margin-top: 25px; 
            text-transform: uppercase; 
            letter-spacing: 3px;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .btn-deploy:hover { 
            transform: scale(1.02); 
            box-shadow: 0 0 45px rgba(212, 175, 55, 0.5); 
            filter: brightness(1.2); 
        }
    </style>
</head>
<body>

<canvas id="bg-canvas"></canvas>

<div class="card">
    <div class="brand-tag">Secure Command</div>
    <h1>Admin Gateway</h1>
    <p class="sub-text">Initialize Institutional Authentication</p>
    
    <form id="regForm">
        <div class="input-group">
            <label>Identification</label>
            <input type="text" id="roll" placeholder="Enter Roll Number" class="input-box" onkeyup="fetchExcel()" required>
        </div>
        
        <div class="input-group">
            <label>Legal Name</label>
            <input type="text" id="name" placeholder="Waiting for Roll ID..." class="input-box readonly" readonly>
        </div>
        
        <div class="input-group">
            <label>Secure Email</label>
            <input type="email" id="mail" placeholder="Waiting for Roll ID..." class="input-box readonly" readonly>
        </div>
        
        <div class="input-group">
            <label>Access Credential</label>
            <input type="password" id="pass" placeholder="Create Pass Key" class="input-box" required>
        </div>
        
        <button type="submit" class="btn-deploy">Deploy Security Key</button>
    </form>
</div>

<script>
    /* THREE.JS BACKGROUND */
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('bg-canvas'), antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);

    const geometry = new THREE.BufferGeometry();
    const vertices = [];
    for (let i = 0; i < 6000; i++) {
        vertices.push(THREE.MathUtils.randFloatSpread(2000), THREE.MathUtils.randFloatSpread(2000), THREE.MathUtils.randFloatSpread(2000));
    }
    geometry.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
    const material = new THREE.PointsMaterial({ color: 0x00f2fe, size: 1.5, transparent: true, opacity: 0.6 });
    const points = new THREE.Points(geometry, material);
    scene.add(points);
    camera.position.z = 500;

    function animate() {
        requestAnimationFrame(animate);
        points.rotation.y += 0.0008;
        points.rotation.x += 0.0003;
        renderer.render(scene, camera);
    }
    animate();

    /* FIREBASE LOGIC */
    const firebaseConfig = { apiKey: "AiZaSyDg1bSCdLj2Em-1WhLInzHevEGT4apSM7U", projectId: "first-rtrp" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const dbBackup = [
        { "roll": "24SS1A6220", "name": "GOKINAPALLI KARTHIK", "email": "jntuhuces24ss1a6220@gmail.com" }, 
        { "roll": "24SS1A6244", "name": "MEDABOINA SANASREE", "email": "jntuhuces24ss1a6244@gmail.com" }
    ];

    function fetchExcel() {
        const val = document.getElementById('roll').value.trim().toUpperCase();
        const user = dbBackup.find(s => s.roll === val);
        if (user) {
            document.getElementById('name').value = user.name;
            document.getElementById('mail').value = user.email;
        } else {
            document.getElementById('name').value = "";
            document.getElementById('mail').value = "";
        }
    }

    document.getElementById('regForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const roll = document.getElementById('roll').value.toUpperCase();
        const name = document.getElementById('name').value;
        const mail = document.getElementById('mail').value;
        const key = document.getElementById('pass').value;

        if(!name) {
            alert("Roll number not recognized in institutional database.");
            return;
        }

        localStorage.setItem("requiredPassKey", key);
        localStorage.setItem("tempAdminName", name);
        localStorage.setItem("tempAdminID", roll);

        db.collection("users").doc(roll).set({ 
            name, roll, email: mail, passKey: key, role: "Admin",
            timestamp: firebase.firestore.FieldValue.serverTimestamp()
        })
        .then(() => {
            alert("Security Protocol Established. Entering Admin Control.");
            window.location.href = "admin.html";
        })
        .catch(err => alert("Error: " + err.message));
    });
</script>
</body>
</html>
